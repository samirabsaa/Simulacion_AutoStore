<app-bus-strip [bus]="bus!"></app-bus-strip>

<div class="monitor-page">

  @if (vista === '2d') {

    <div class="monitor__body">

      <div class="monitor__grid-area">

        <!-- Tab selector + Controls -->
        <div class="monitor__controls-row">
          <div class="monitor__tabs">
            <button class="monitor__tab monitor__tab--active"
                    (click)="setVista('2d')">2D Grilla</button>
            <button class="monitor__tab"
                    (click)="setVista('3d')">3D Omniverse</button>
          </div>

          <app-control-bar
            [running]="bus?.running ?? false"
            [speed]="(bus?.velocidad ?? 1)"
            (play)="onPlay()"
            (pause)="onPause()"
            (reset)="onReset()"
            (speedChange)="onSpeedChange($event)"
          ></app-control-bar>
        </div>

        <!-- Grid -->
        @if (bus) {
          <div class="monitor__grid">
            <app-robot-grid
              [gridZ]="bus.grid.z"
              [gridTotal]="bus.gridTotal"
              [interior]="bus.interior"
              [grilla]="bus.grilla"
              [robots]="bus.robots"
              [estaciones]="bus.estaciones"
              [conveyorsNorte]="bus.conveyorsNorte"
              [tick]="bus.tick"
            ></app-robot-grid>
          </div>
        }

      </div>

      <!-- KPI sidebar -->
      @if (bus) {
        <app-kpi-sidebar [bus]="bus" class="monitor__kpi-area"></app-kpi-sidebar>
      }

    </div>

  } @else {

    <!-- Tab selector for 3D view -->
    <div class="monitor__tabs">
      <button class="monitor__tab"
              (click)="setVista('2d')">2D Grilla</button>
      <button class="monitor__tab monitor__tab--active"
              (click)="setVista('3d')">3D Omniverse</button>
    </div>

    <!-- 3D placeholder -->
    <div class="monitor__placeholder">
      <div class="monitor__placeholder-icon">▣</div>
      <h2>Modulo M3: Pendiente</h2>
      <p>La visualizacion 3D en Omniverse se integrara en una version futura.</p>
    </div>

  }

</div>
