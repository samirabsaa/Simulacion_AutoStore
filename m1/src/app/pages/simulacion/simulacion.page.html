<div class="as-page">
  @if (bus) {
    <app-bus-strip [bus]="bus"></app-bus-strip>
  }

  <div class="as-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;gap:16px">
    <div style="font-size:48px">▣</div>
    <h2 style="margin:0;font-size:20px;font-weight:600">Vista 3D · NVIDIA Omniverse</h2>
    <p style="margin:0;color:var(--text-muted);font-size:14px;text-align:center;max-width:480px">
      La integración con NVIDIA Omniverse Kit SDK (M3) se implementa una vez que
      el Motor (M2) esté completo. El viewport 3D se renderizará aquí vía USD.
    </p>
    <div style="padding:8px 18px;background:var(--surface-app);border-radius:var(--radius-pill);font-size:13px;color:var(--text-muted);font-weight:600">
      Módulo M3 — Pendiente
    </div>
  </div>
</div>
